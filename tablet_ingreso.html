<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recepción - Lavadero Estética</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            margin: 0; padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            font-family: var(--font-sans);
        }
        .header {
            padding: 1rem 2rem;
            background: rgba(9, 9, 11, 0.9);
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-family: var(--font-display);
            margin: 0;
            font-size: 1.5rem;
            color: var(--color-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .main-container {
            flex: 1;
            padding: 2rem;
            display: flex;
            gap: 2rem;
            overflow-y: auto;
        }
        .panel {
            background: var(--color-panel-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 1rem;
            padding: 2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .scanner-placeholder {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 2px dashed var(--color-cyan);
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .scanner-placeholder:hover {
            background: rgba(0, 240, 255, 0.05);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--color-text-dim);
            font-weight: 600;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 1rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 0.5rem;
            font-size: 1.1rem;
        }
        .payment-methods {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .pay-method {
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
            border-radius: 0.5rem;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .pay-method.active {
            border-color: var(--color-lime);
            background: rgba(20, 255, 0, 0.1);
            color: var(--color-lime);
        }
        .btn-large {
            padding: 1.5rem;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            width: 100%;
            border-radius: 0.5rem;
            cursor: pointer;
            border: none;
            background: var(--color-cyan);
            color: #fff;
            transition: all 0.3s;
        }
        .btn-large:hover {
            background: #00c0cc;
        }
        /* Scanner Anim */
        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--color-cyan);
            box-shadow: 0 0 15px var(--color-cyan);
            animation: scan 2s infinite linear;
            display: none;
        }
        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        /* Overlay de pago */
        .payment-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .qr-mock {
            width: 300px; height: 300px;
            background: white;
            padding: 1rem;
            border-radius: 1rem;
            margin: 1rem 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .qr-mock img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Toast Notification */
        .toast-notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(132, 204, 22, 0.95);
            border: 1px solid var(--color-lime);
            color: #000;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s forwards, fadeOut 0.3s 3.7s forwards;
            font-family: var(--font-sans);
        }
        @keyframes slideIn {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>Recepción - Ingreso</h1>
        <div id="clock">--:--</div>
    </header>

    <div class="main-container">
        <!-- Panel Izquierdo: Escáner y Datos -->
        <div class="panel">
            <h2 style="margin-top:0; color: var(--color-lime);">1. Datos del Vehículo</h2>
            <div class="datos-vehiculo-flex" style="display: flex; gap: 1.5rem; flex: 1; align-items: stretch;">
                <div class="scanner-placeholder" id="btn-scan" onclick="startScan()" style="flex: 1; max-width: 220px; height: 100%;">
                    <div class="scan-line" id="scan-line"></div>
                    <div style="font-size: 3.5rem; margin-bottom: 0.5rem;">📷</div>
                    <h3 style="font-size: 1.1rem; text-align: center; padding: 0 10px; margin: 0.5rem 0;">Escanear Patente</h3>
                    <p style="color: var(--color-text-dim); font-size: 0.8rem; text-align: center; padding: 0 10px; margin: 0;">Autocompletará Modelo y Color</p>
                </div>

                <div style="flex: 2; display: flex; flex-direction: column; justify-content: center; gap: 1.5rem;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Patente</label>
                        <input type="text" id="in-plate" placeholder="Ej: AA123ZZ">
                    </div>
                    <div style="display:flex; gap:1rem;">
                        <div class="form-group" style="flex:1; margin-bottom: 0;">
                            <label>Modelo / Apodo</label>
                            <input type="text" id="in-model" placeholder="Ej: Toyota Hilux">
                        </div>
                        <div class="form-group" style="width: 100px; margin-bottom: 0;">
                            <label>Color</label>
                            <input type="color" id="in-color" value="#ffffff" style="padding:0; height: 3.5rem; cursor:pointer;">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Panel Derecho: Servicios y Pago -->
        <div class="panel">
            <h2 style="margin-top:0; color: var(--color-lime);">2. Servicio y Pago</h2>
            
            <div class="form-group">
                <label>Seleccionar Servicio</label>
                <select id="in-service" onchange="updatePrice()">
                    <!-- Cargar dinámicamente -->
                </select>
            </div>

            <div class="form-group">
                <label>Precio Final</label>
                <input type="text" id="in-price" readonly style="font-family: var(--font-display); font-size: 2rem; color: var(--color-cyan); font-weight: bold;">
            </div>

            <label style="display:block; margin-bottom:0.5rem; color: var(--color-text-dim); font-weight:600;">Medio de Pago</label>
            <div class="payment-methods">
                <div class="pay-method active" onclick="selectPay('efectivo')" id="pay-efectivo">💵 Efectivo</div>
                <div class="pay-method" onclick="selectPay('qr')" id="pay-qr">📱 Código QR</div>
                <div class="pay-method" onclick="selectPay('tarjeta')" id="pay-tarjeta">💳 Tarjeta</div>
            </div>

            <button class="btn-large" onclick="processPayment()">IMPRIMIR TICKET E INGRESAR</button>
        </div>
    </div>

    <!-- Overlay de Procesamiento de Pago -->
    <div class="payment-overlay" id="pay-overlay">
        <h2 style="color:var(--color-cyan); font-family: var(--font-display);" id="pay-title">Procesando Pago...</h2>
        <div id="pay-content">
            <!-- Loader o QR -->
        </div>
        <p style="margin-top: 2rem; color: var(--color-text-dim);">Por favor, siga las instrucciones.</p>
        <button class="btn btn-secondary" onclick="cancelPayment()" style="margin-top: 2rem;">Cancelar</button>
    </div>

    <script>
        // Reloj
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('es-AR'), 1000);

        let selectedPayment = 'efectivo';
        let currentPrice = 0;
        let washPackages = [];

        function loadServices() {
            let saved = localStorage.getItem('lavadero_wash_settings');
            // Limpiar si hay emojis corruptos
            if (saved && (saved.includes('ðŸ') || saved.includes('Ã') || saved.includes('â\x80'))) {
                localStorage.removeItem('lavadero_wash_settings');
                saved = null;
            }
            if (saved) {
                washPackages = JSON.parse(saved);
            } else {
                // Fallback completo con emojis correctos
                washPackages = [
                    { id: 'combo-limpieza-total', title: 'Limpieza Total', icon: '🌀', price: 18000 },
                    { id: 'combo-vip-gold',       title: 'VIP Gold',       icon: '🏆', price: 25000 },
                    { id: 'lavado-carroceria',    title: 'Exterior Simple', icon: '🚗', price: 12000 },
                    { id: 'aspirado-interior',    title: 'Interior Pro',    icon: '💨', price: 10000 },
                    { id: 'lavado-express',       title: 'Express',        icon: '⚡', price: 8000  },
                    { id: 'lavado-motor',         title: 'Motor Vapor',    icon: '🔥', price: 15000 },
                    { id: 'encerado-acrilico',    title: 'Encerado',       icon: '🛡️', price: 22000 },
                    { id: 'lavado-chasis',        title: 'Chasis',         icon: '🔩', price: 28000 },
                    { id: 'pulido-opticas',       title: 'Ópticas',        icon: '💡', price: 16000 },
                    { id: 'tratamiento-ceramico', title: 'Cerámico 9H',    icon: '💎', price: 65000 }
                ];
            }

            const select = document.getElementById('in-service');
            select.innerHTML = '';
            washPackages.forEach(p => {
                select.innerHTML += `<option value="${p.id}" data-price="${p.price}">${p.icon} ${p.title} ($${p.price.toLocaleString('es-AR')})</option>`;
            });
            updatePrice();
        }


        function updatePrice() {
            const select = document.getElementById('in-service');
            const opt = select.options[select.selectedIndex];
            currentPrice = parseInt(opt.getAttribute('data-price'));
            document.getElementById('in-price').value = `$${currentPrice.toLocaleString('es-AR')}`;
        }

        function selectPay(method) {
            selectedPayment = method;
            document.querySelectorAll('.pay-method').forEach(el => el.classList.remove('active'));
            document.getElementById(`pay-${method}`).classList.add('active');
        }

        let detectedOnlineId = null;

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            if (type === 'error') {
                toast.style.background = 'rgba(239, 68, 68, 0.95)';
                toast.style.borderColor = '#ef4444';
                toast.style.color = '#fff';
            }
            toast.innerHTML = `<span>${msg}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3700);
        }

        async function checkOnlinePreRegistration(plate) {
            if (!plate || plate.trim().length < 6) {
                detectedOnlineId = null;
                return;
            }
            
            const cleanPlate = plate.trim().toUpperCase();
            const localConfig = JSON.parse(localStorage.getItem('lavadero_config') || '{}');
            const url_base = (localConfig.supabaseUrl && localConfig.supabaseKey) ? localConfig.supabaseUrl : PANEL_CONFIG.supabaseUrl;
            const key = (localConfig.supabaseUrl && localConfig.supabaseKey) ? localConfig.supabaseKey : PANEL_CONFIG.supabaseKey;
            const table = localConfig.queueTable || PANEL_CONFIG.queueTable;

            try {
                const res = await fetch(`${url_base}/rest/v1/${table}?plate=eq.${cleanPlate}&status=eq.waiting&order=entered_at.desc&limit=1`, {
                    method: 'GET',
                    headers: { 
                        'apikey': key, 
                        'Authorization': `Bearer ${key}`, 
                        'Content-Type': 'application/json' 
                    }
                });

                if (!res.ok) throw new Error("Error en la consulta");

                const data = await res.json();
                if (data && data.length > 0) {
                    const onlineReg = data[0];
                    detectedOnlineId = onlineReg.id;

                    // Autocompletar campos
                    document.getElementById('in-model').value = onlineReg.model || `Vehículo ${onlineReg.plate}`;
                    
                    // Seleccionar servicio
                    if (onlineReg.wash_type) {
                        const selectService = document.getElementById('in-service');
                        selectService.value = onlineReg.wash_type;
                        updatePrice();
                    }

                    // Seleccionar método de pago
                    if (onlineReg.payment_method) {
                        let mappedPay = 'efectivo';
                        if (onlineReg.payment_method === 'transferencia' || onlineReg.payment_method === 'qr') {
                            mappedPay = 'qr';
                        } else if (onlineReg.payment_method === 'tarjeta') {
                            mappedPay = 'tarjeta';
                        }
                        selectPay(mappedPay);
                    }

                    showToast(`✅ ¡Pre-registro Online Detectado para la patente ${cleanPlate}! Datos cargados.`, 'success');
                } else {
                    detectedOnlineId = null;
                }
            } catch (err) {
                console.warn('[Tablet] Error verificando pre-registro:', err);
                detectedOnlineId = null;
            }
        }

        function startScan() {
            document.getElementById('scan-line').style.display = 'block';
            
            setTimeout(() => {
                document.getElementById('scan-line').style.display = 'none';
                
                const plates = ["AF452ZZ", "AD123BC", "AB987CD", "AC333EE"];
                const models = ["VW Amarok", "Toyota Corolla", "Ford Ranger", "Peugeot 208"];
                const colors = ["#ffffff", "#000000", "#1e3a8a", "#dc2626"];
                
                const r = Math.floor(Math.random() * plates.length);
                document.getElementById('in-plate').value = plates[r];
                document.getElementById('in-model').value = models[r];
                document.getElementById('in-color').value = colors[r];
                
                showToast("Escáner IA: Vehículo identificado con 98% de confianza.");
                
                // Disparar validación de pre-registro
                checkOnlinePreRegistration(plates[r]);
            }, 2000);
        }

        function processPayment() {
            const plate = document.getElementById('in-plate').value;
            const model = document.getElementById('in-model').value;
            if(!plate || !model) {
                alert("Por favor escanea o ingresa la patente y modelo primero.");
                return;
            }

            const overlay = document.getElementById('pay-overlay');
            const title = document.getElementById('pay-title');
            const content = document.getElementById('pay-content');
            
            overlay.style.display = 'flex';

            if(selectedPayment === 'efectivo') {
                title.innerText = "Abonar en Caja";
                content.innerHTML = `<h1 style="font-size: 4rem; margin:0;">$${currentPrice.toLocaleString('es-AR')}</h1><p>Reciba el dinero y presione Confirmar.</p><button class="btn btn-primary" style="padding:1rem 2rem; font-size:1.2rem; margin-top:1rem;" onclick="finishIngreso()">CONFIRMAR EFECTIVO</button>`;
            } 
            else if (selectedPayment === 'qr') {
                title.innerText = "Escanea el código QR";
                content.innerHTML = `
                    <div class="qr-mock">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=lavadero_pago_${currentPrice}" alt="QR Code">
                    </div>
                    <button class="btn btn-primary" style="padding:1rem 2rem; font-size:1.2rem;" onclick="finishIngreso()">SIMULAR PAGO RECIBIDO</button>
                `;
            }
            else {
                title.innerText = "Acerque la Tarjeta al Posnet";
                content.innerHTML = `<div style="font-size: 5rem; animation: pulse 1s infinite;">💳</div>`;
                // Auto aprobar a los 3 segundos
                setTimeout(() => {
                    if(overlay.style.display === 'flex') finishIngreso();
                }, 3000);
            }
        }

        function cancelPayment() {
            document.getElementById('pay-overlay').style.display = 'none';
        }

        function finishIngreso() {
            // Guardar auto en LocalStorage
            const car = {
                id: detectedOnlineId || Math.random().toString(36).substr(2, 9),
                tracking_id: Math.floor(Math.random() * 900) + 100,
                nickname: document.getElementById('in-model').value,
                plate: document.getElementById('in-plate').value.toUpperCase(),
                color: document.getElementById('in-color').value,
                zone: 'espera',
                budget: currentPrice,
                wash_type: document.getElementById('in-service').value,
                description: `Pago vía: ${selectedPayment.toUpperCase()}`,
                entered_at: new Date().toISOString()
            };

            const saved = localStorage.getItem('lavadero_active_vehicles');
            const activeVehicles = saved ? JSON.parse(saved) : [];
            activeVehicles.push(car);
            
            localStorage.setItem('lavadero_active_vehicles', JSON.stringify(activeVehicles));
            
            // Disparar evento para otras pestañas (como en el mismo window no se dispara onstorage, lo disparamos manual si hiciera falta)
            window.dispatchEvent(new Event('storage'));
            pushVehicleToSupabase(car, detectedOnlineId); // Enviar a Supabase

            // Ocultar modal y mostrar éxito
            cancelPayment();
            
            // Si estuviéramos conectados a una impresora térmica
            // console.log("Imprimiendo Ticket #", car.tracking_id);
            alert(`¡Ticket #${car.tracking_id} Generado!\nEl vehículo ya entró a la cola.`);

            // Limpiar
            document.getElementById('in-plate').value = '';
            document.getElementById('in-model').value = '';
            document.getElementById('in-color').value = '#ffffff';
            detectedOnlineId = null; // Limpiar después de procesar
        }
        
        // Configuración Supabase fija — mismo proyecto que el Panel principal
        const PANEL_CONFIG = {
            supabaseUrl: 'https://hacmhlyvyyysnvekvhya.supabase.co',
            supabaseKey: 'sb_publishable_oEB1MoOee7lM99mvHCu_aA_T98vg3NA',
            queueTable: 'lavadero_camera_queue'
        };

        // --- SISTEMA OFFLINE & COLA DE SINCRONIZACIÓN ---
        function queueForSync(payload) {
            const queue = JSON.parse(localStorage.getItem('lavadero_offline_queue') || '[]');
            queue.push(payload);
            localStorage.setItem('lavadero_offline_queue', JSON.stringify(queue));
            console.log('[Tablet] 💾 Guardado en cola offline. Pendientes:', queue.length);
        }

        async function processOfflineQueue() {
            if (!navigator.onLine) return;
            const queue = JSON.parse(localStorage.getItem('lavadero_offline_queue') || '[]');
            if (queue.length === 0) return;

            console.log('[Tablet] 🔄 Sincronizando', queue.length, 'registros offline...');
            const localConfig = JSON.parse(localStorage.getItem('lavadero_config') || '{}');
            const url_base = (localConfig.supabaseUrl && localConfig.supabaseKey) ? localConfig.supabaseUrl : PANEL_CONFIG.supabaseUrl;
            const key = (localConfig.supabaseUrl && localConfig.supabaseKey) ? localConfig.supabaseKey : PANEL_CONFIG.supabaseKey;
            const table = localConfig.queueTable || PANEL_CONFIG.queueTable;

            const pending = [];
            for (const payload of queue) {
                try {
                    const res = await fetch(`${url_base}/rest/v1/${table}`, {
                        method: 'POST',
                        headers: { 'apikey': key, 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
                        body: JSON.stringify(payload)
                    });
                    if (!res.ok) throw new Error("Fallo sync de registro");
                    console.log('[Tablet] ✅ Sincronizado ticket', payload.tracking_id);
                } catch(err) {
                    pending.push(payload); // Falla, vuelve a la cola
                }
            }
            localStorage.setItem('lavadero_offline_queue', JSON.stringify(pending));
            if(pending.length === 0 && queue.length > 0) alert('Sincronización offline completada');
        }

        window.addEventListener('online', processOfflineQueue);
        setInterval(processOfflineQueue, 15000); // Reintento periodico por si acaso

        async function pushVehicleToSupabase(car, isUpdateId = null) {
            const localConfig = JSON.parse(localStorage.getItem('lavadero_config') || '{}');
            const url_base = (localConfig.supabaseUrl && localConfig.supabaseKey) ? localConfig.supabaseUrl : PANEL_CONFIG.supabaseUrl;
            const key = (localConfig.supabaseUrl && localConfig.supabaseKey) ? localConfig.supabaseKey : PANEL_CONFIG.supabaseKey;
            const table = localConfig.queueTable || PANEL_CONFIG.queueTable;

            const nicknamePayload = JSON.stringify({
                name: car.nickname,
                plate: car.plate,
                budget: car.budget,
                wash_type: car.wash_type,
                description: car.description
            });

            // Payload varía si es UPDATE o INSERT
            const payload = isUpdateId ? {
                nickname: nicknamePayload,
                color: car.color,
                zone: car.zone,
                entered_at: car.entered_at,
                status: 'active'
            } : {
                id: car.id,
                tracking_id: car.tracking_id,
                nickname: nicknamePayload,
                color: car.color,
                zone: car.zone,
                entered_at: car.entered_at
            };

            if (!navigator.onLine) {
                // En modo offline, encolamos el POST de inserción
                const fallbackPayload = {
                    id: car.id,
                    tracking_id: car.tracking_id,
                    nickname: nicknamePayload,
                    color: car.color,
                    zone: car.zone,
                    entered_at: car.entered_at
                };
                queueForSync(fallbackPayload);
                return;
            }

            try {
                const url = isUpdateId 
                    ? `${url_base}/rest/v1/${table}?id=eq.${isUpdateId}` 
                    : `${url_base}/rest/v1/${table}`;
                const method = isUpdateId ? 'PATCH' : 'POST';

                const res = await fetch(url, {
                    method: method,
                    headers: { 
                        'apikey': key, 
                        'Authorization': `Bearer ${key}`, 
                        'Content-Type': 'application/json', 
                        'Prefer': 'return=representation' 
                    },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    console.log(`[Tablet] ✅ Auto ${isUpdateId ? 'actualizado' : 'enviado'} al panel — Ticket #${car.tracking_id}`);
                } else {
                    const errText = await res.text();
                    console.error('[Tablet] ❌ Error Supabase:', res.status, errText);
                    const fallbackPayload = {
                        id: car.id,
                        tracking_id: car.tracking_id,
                        nickname: nicknamePayload,
                        color: car.color,
                        zone: car.zone,
                        entered_at: car.entered_at
                    };
                    queueForSync(fallbackPayload);
                }
            } catch (err) {
                console.error('[Tablet] ❌ Sin conexión a Supabase:', err);
                const fallbackPayload = {
                    id: car.id,
                    tracking_id: car.tracking_id,
                    nickname: nicknamePayload,
                    color: car.color,
                    zone: car.zone,
                    entered_at: car.entered_at
                };
                queueForSync(fallbackPayload);
            }
        }
        
        // Al arrancar procesamos posibles rezagados
        processOfflineQueue();



        // Escuchar cambios en la patente para validación online
        document.getElementById('in-plate').addEventListener('input', (e) => {
            const val = e.target.value.toUpperCase();
            e.target.value = val;
            if (val.length >= 6) {
                checkOnlinePreRegistration(val);
            } else {
                detectedOnlineId = null;
            }
        });

        loadServices();
