<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acceso Cliente - Lavadero Estética Vehicular</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Orbitron:wght@700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--color-bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
            text-align: center;
        }

        .auth-card {
            background: var(--color-card-bg);
            border: 1px solid var(--color-card-border);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .auth-header {
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--color-cyan);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .auth-header p {
            color: var(--color-text-dim);
            font-size: 0.85rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-dim);
            font-weight: 700;
        }

        .auth-input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.75rem;
            color: #fff;
            font-family: var(--font-main);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--color-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
            background: rgba(0, 240, 255, 0.05);
        }

        .btn-auth {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 1rem;
            margin-top: 1rem;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--color-text-dim);
            font-size: 0.75rem;
        }

        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .auth-divider:not(:empty)::before {
            margin-right: .5em;
        }

        .auth-divider:not(:empty)::after {
            margin-left: .5em;
        }

        .btn-google {
            background-color: #fff;
            color: #000;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-google:hover {
            background-color: #f1f1f1;
            transform: translateY(-2px);
        }

        .toggle-mode {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--color-text-dim);
        }

        .toggle-mode a {
            color: var(--color-cyan);
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
        }

        .toggle-mode a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-message {
            color: var(--color-yellow);
            font-size: 0.8rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="neon-grid"></div>

    <div class="auth-card">
        <div class="auth-header">
            <h1 id="auth-title">Iniciar Sesión</h1>
            <p id="auth-subtitle">Accede para gestionar tus lavados y turnos.</p>
        </div>

        <form id="auth-form" onsubmit="handleAuth(event)">
            <div class="form-group" id="name-group" style="display: none;">
                <label for="name">Nombre Completo</label>
                <input type="text" id="name" class="auth-input" placeholder="Ej: Juan Pérez">
            </div>
            <div class="form-group">
                <label for="phone">Número de Celular</label>
                <input type="tel" id="phone" class="auth-input" placeholder="Ej: 11 1234 5678" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="auth-input" placeholder="••••••••" required>
            </div>
            
            <p id="error-msg" class="error-message"></p>

            <button type="submit" class="btn btn-primary btn-auth" id="btn-submit">
                Entrar
            </button>
        </form>

        <div class="auth-divider">O</div>

        <button class="btn btn-auth btn-google" onclick="loginWithGoogle()">
            <i class="fa-brands fa-google"></i> Continuar con Google
        </button>

        <p class="toggle-mode" id="toggle-text">
            ¿No tienes cuenta? <a onclick="toggleAuthMode()">Regístrate aquí</a>
        </p>
    </div>

    <footer class="app-footer" style="margin-top: 2rem;">
        &copy; 2026 <strong>Omar Adamo</strong>. Todos los derechos reservados. <br>
        Lavadero Estética Vehicular • Software Independiente
    </footer>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        let isLogin = true;

        function toggleAuthMode() {
            isLogin = !isLogin;
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const btnSubmit = document.getElementById('btn-submit');
            const toggleText = document.getElementById('toggle-text');
            const nameGroup = document.getElementById('name-group');

            if (isLogin) {
                title.innerText = 'Iniciar Sesión';
                subtitle.innerText = 'Accede para gestionar tus lavados y turnos.';
                btnSubmit.innerText = 'Entrar';
                toggleText.innerHTML = '¿No tienes cuenta? <a onclick="toggleAuthMode()">Regístrate aquí</a>';
                nameGroup.style.display = 'none';
                document.getElementById('name').removeAttribute('required');
            } else {
                title.innerText = 'Crear Cuenta';
                subtitle.innerText = 'Regístrate para reservar y seguir tus turnos.';
                btnSubmit.innerText = 'Registrarme';
                toggleText.innerHTML = '¿Ya tienes cuenta? <a onclick="toggleAuthMode()">Inicia sesión aquí</a>';
                nameGroup.style.display = 'block';
                document.getElementById('name').setAttribute('required', 'true');
            }
        }

        const supabaseUrl = 'https://actxvqczpnbstlatrvto.supabase.co';
        const supabaseKey = ''; // Pegá tu Supabase Key aquí
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function handleAuth(e) {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const errorMsg = document.getElementById('error-msg');
            
            errorMsg.style.display = 'none';
            document.getElementById('btn-submit').innerText = 'Procesando...';

            try {
                // Intento de conexión con Supabase Real
                const { data, error } = isLogin 
                    ? await supabase.auth.signInWithPassword({ phone, password })
                    : await supabase.auth.signUp({ phone, password, options: { data: { full_name: name } } });

                if (error) {
                    // Si el error es de autenticación o token inválido (como parece ser la key), hacemos Fallback a LocalStorage
                    console.warn("Fallo en Supabase, utilizando Simulador Local (LocalStorage). Error:", error.message);
                    throw error;
                }

                alert(isLogin ? 'Sesión iniciada en Supabase' : 'Cuenta creada en Supabase');
                window.location.href = 'cliente.html';

            } catch (error) {
                // FALLBACK LOCAL: Simulador de DB
                localStorage.setItem('lavadero_user', JSON.stringify({
                    phone: phone,
                    name: name || phone,
                    role: 'cliente'
                }));
                
                setTimeout(() => {
                    alert(isLogin ? '(Simulador) Sesión iniciada con éxito' : '(Simulador) Cuenta creada con éxito');
                    window.location.href = 'cliente.html';
                }, 800);
            }
        }

        async function loginWithGoogle() {
            // Ejemplo comentado Supabase Google OAuth:
            /*
            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
            });
            */
            alert("Próximamente: Integración con Google");
        }
    </script>
</body>
</html>
