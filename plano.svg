<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 300" width="100%" height="100%" preserveAspectRatio="none">
    <defs>
        <!-- Background Grid -->
        <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
            <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#222" stroke-width="0.5"/>
        </pattern>
        <!-- Scalextric Slot Glow -->
        <filter id="slotGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Base -->
    <rect width="100%" height="100%" fill="#111"/>
    <rect width="100%" height="100%" fill="url(#grid)"/>

    <!-- Track Asphalt (U-shape) -->
    <path d="
        M 325,300
        L 325,80
        Q 325,20 265,20
        L 85,20
        Q 25,20 25,80
        L 25,300
        L 75,300
        L 75,80
        Q 75,50 85,50
        L 265,50
        Q 275,50 275,80
        L 275,300
        Z
    " fill="#18181b" stroke="#3f3f46" stroke-width="2"/>

    <!-- Scalextric Metal Slots (The Rails) -->
    <g stroke="#94a3b8" stroke-width="1.5" fill="none" filter="url(#slotGlow)">
        <!-- Inner slot inside metal rails -->
        <g stroke="#000" stroke-width="0.5">
            <!-- Right lanes -->
            <line x1="287.5" y1="300" x2="287.5" y2="80" />
            <line x1="312.5" y1="300" x2="312.5" y2="80" />
            <path d="M 287.5,80 Q 287.5,35 265,35" />
            <path d="M 312.5,80 Q 312.5,35 265,35" />
            
            <!-- Top lane (Tunnel) -->
            <line x1="265" y1="35" x2="85" y2="35" />
            
            <!-- Left lanes -->
            <path d="M 85,35 Q 37.5,35 37.5,80" />
            <path d="M 85,35 Q 62.5,35 62.5,80" />
            <line x1="37.5" y1="80" x2="37.5" y2="300" />
            <line x1="62.5" y1="80" x2="62.5" y2="300" />
        </g>
    </g>

    <!-- Track lane dividers (dashed lines between slots) -->
    <line x1="300" y1="300" x2="300" y2="80" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6,6" />
    <line x1="50" y1="300" x2="50" y2="80" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6,6" />

    <!-- Pit entry/exit lines -->
    <line x1="275" y1="50" x2="275" y2="20" stroke="#fff" stroke-width="2" stroke-dasharray="4,4" />
    <line x1="75" y1="50" x2="75" y2="20" stroke="#fff" stroke-width="2" stroke-dasharray="4,4" />

    <!-- Outer Curbs (Red and White) -->
    <path d="M 325,120 L 325,80 Q 325,20 265,20 L 225,20" fill="none" stroke="red" stroke-width="4" stroke-dasharray="8,8"/>
    <path d="M 325,120 L 325,80 Q 325,20 265,20 L 225,20" fill="none" stroke="white" stroke-width="4" stroke-dasharray="8,8" stroke-dashoffset="8"/>

    <path d="M 125,20 L 85,20 Q 25,20 25,80 L 25,120" fill="none" stroke="red" stroke-width="4" stroke-dasharray="8,8"/>
    <path d="M 125,20 L 85,20 Q 25,20 25,80 L 25,120" fill="none" stroke="white" stroke-width="4" stroke-dasharray="8,8" stroke-dashoffset="8"/>

    <!-- Central AURA Rhombus HQ -->
    <polygon points="175,80 240,160 175,240 110,160" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <polygon points="175,95 220,160 175,225 130,160" fill="#1e293b" />
    
    <!-- Dividing lines -->
    <line x1="175" y1="95" x2="175" y2="225" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="2,2"/>
    
    <!-- Text Labels -->
    <text x="145" y="165" fill="#94a3b8" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle" transform="rotate(-45 145 165)">CAFE</text>
    <text x="205" y="165" fill="#94a3b8" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle" transform="rotate(45 205 165)">DETAILING</text>

    <!-- AURA Logo -->
    <circle cx="175" cy="160" r="18" fill="#0284c7" stroke="#bae6fd" stroke-width="2"/>
    <text x="175" y="164" fill="#ffffff" font-family="sans-serif" font-size="11" font-weight="900" text-anchor="middle" letter-spacing="1">AURA</text>

</svg>
