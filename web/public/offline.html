<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión — L1DERES Car Wash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            overflow: hidden;
        }

        /* Fondo animado */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(200,150,12,0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        .offline-icon {
            width: 100px;
            height: 100px;
            margin-bottom: 1.5rem;
            animation: pulse 2s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(200,150,12,0.4));
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.4rem;
            letter-spacing: 0.1em;
            background: linear-gradient(135deg, #f5c842, #c8960c, #f5c842);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 0.75rem;
            color: #fff;
        }

        p {
            color: rgba(255,255,255,0.55);
            font-size: 1rem;
            max-width: 300px;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(200,150,12,0.12);
            border: 1px solid rgba(200,150,12,0.3);
            border-radius: 50px;
            padding: 0.5rem 1.2rem;
            font-size: 0.85rem;
            color: #f5c842;
            margin-bottom: 2rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #f5c842;
            border-radius: 50%;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .btn-retry {
            background: linear-gradient(135deg, #c8960c, #f5c842);
            color: #000;
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(200,150,12,0.3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(200,150,12,0.5);
        }

        .btn-retry:active {
            transform: translateY(0);
        }

        footer {
            position: fixed;
            bottom: 1.5rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <!-- Ícono offline -->
    <svg class="offline-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" stroke="#c8960c" stroke-width="3" stroke-dasharray="8 4" opacity="0.4"/>
        <path d="M25 35 Q50 15 75 35" stroke="#c8960c" stroke-width="4" stroke-linecap="round" fill="none"/>
        <path d="M33 47 Q50 30 67 47" stroke="#c8960c" stroke-width="4" stroke-linecap="round" fill="none"/>
        <circle cx="50" cy="62" r="6" fill="#c8960c"/>
        <line x1="20" y1="20" x2="80" y2="80" stroke="#c8960c" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    </svg>

    <div class="logo-text">L1DERES CAR WASH</div>

    <h1>Sin conexión</h1>
    <p>No hay internet en este momento. Tu info está guardada y se sincronizará automáticamente cuando vuelva la conexión.</p>

    <div class="status-badge">
        <div class="dot"></div>
        Esperando conexión...
    </div>

    <button class="btn-retry" onclick="intentarReconectar()">
        🔄 Reintentar ahora
    </button>

    <footer>© 2026 <strong>Aura</strong>. Todos los derechos reservados.</footer>

    <script>
        function intentarReconectar() {
            if (navigator.onLine) {
                window.location.href = './cliente.html';
            } else {
                const btn = document.querySelector('.btn-retry');
                btn.textContent = '❌ Sin señal aún...';
                setTimeout(() => { btn.textContent = '🔄 Reintentar ahora'; }, 2000);
            }
        }

        // Redirigir automáticamente cuando vuelva la conexión
        window.addEventListener('online', () => {
            window.location.href = './cliente.html';
        });
    </script>
</body>
</html>
